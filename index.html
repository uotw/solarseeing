  .skel { background: rgba(255,255,255,0.06); border-radius: 4px; animation: shimmer 1.5s ease-in-out infinite; }
  @keyframes taper-grow { 0% { transform: scaleX(0); opacity: 0; } 60% { opacity: 1; } 100% { transform: scaleX(1); opacity: 1; } }
  .taper-line { transform-origin: center; animation: taper-grow 0.8s cubic-bezier(0.16,1,0.3,1) 0.2s both; }
  @keyframes slideOutLeft  { from { transform:translateX(0);    opacity:1; } to { transform:translateX(-90px); opacity:0; } }
  @keyframes slideOutRight { from { transform:translateX(0);    opacity:1; } to { transform:translateX( 90px); opacity:0; } }
  @keyframes slideInRight  { from { transform:translateX(60px); opacity:0; } to { transform:translateX(0);     opacity:1; } }

<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback } = React;

const PRESSURE_LEVELS = [
  { hpa: 850, alt: "4k ft", label: "850 hPa", weight: 0.40, color: "#22d3ee" },
  { hpa: 700, alt: "9k ft", label: "700 hPa", weight: 0.25, color: "#818cf8" },
  { hpa: 500, alt: "17k ft", label: "500 hPa", weight: 0.15, color: "#fb923c" },
  { hpa: 250, alt: "32k ft", label: "250 hPa", weight: 0.20, color: "#f472b6" },
];

function windSpeedScore(speed_ms, hpa) {
  if (hpa === 850) {
    if (speed_ms < 2) return 70;
    if (speed_ms < 5) return 100;
    if (speed_ms < 8) return 75;
    if (speed_ms < 10) return 55;
    if (speed_ms < 15) return 25;
    return 5;
  }
  if (hpa === 700) {
    if (speed_ms < 5) return 100;
    if (speed_ms < 8) return 85;
    if (speed_ms < 12) return 60;
    if (speed_ms < 15) return 35;
    return 10;
  }
  if (hpa === 500) {
    if (speed_ms < 8) return 100;
    if (speed_ms < 15) return 70;
    if (speed_ms < 20) return 45;
    if (speed_ms < 30) return 20;
    return 5;
  }
  if (speed_ms < 10) return 100;
  if (speed_ms < 20) return 75;
  if (speed_ms < 30) return 45;
  if (speed_ms < 40) return 20;
  return 5;
}

function shearPenalty(layers) {
  var penalty = 0;
  for (var i = 0; i < layers.length - 1; i++) {
    var l1 = layers[i], l2 = layers[i + 1];
    var dDir = Math.abs(l1.direction - l2.direction);
    if (dDir > 180) dDir = 360 - dDir;
    var r1 = l1.direction * Math.PI / 180, r2 = l2.direction * Math.PI / 180;
    var u1 = l1.speed * Math.sin(r1), v1 = l1.speed * Math.cos(r1);
    var u2 = l2.speed * Math.sin(r2), v2 = l2.speed * Math.cos(r2);
    var vectorDiff = Math.sqrt((u2 - u1) * (u2 - u1) + (v2 - v1) * (v2 - v1));
    if (vectorDiff > 30) penalty += 10;
    else if (vectorDiff > 20) penalty += 6;
    else if (vectorDiff > 15) penalty += 3;
    if (dDir > 120) penalty += 6;
    else if (dDir > 90) penalty += 3;
    else if (dDir > 60) penalty += 1;
  }
  return Math.min(penalty, 35);
}

/* Boundary layer thermal penalty.
   Sources: Andreas (1988) JOSA-A — Cn² ∝ H^(2/3) via Monin-Obukhov similarity theory.
   Quatresooz et al. (COAT2023) — hybrid Cn² model using SHF and PBL height hBL.
   Correlation analysis (St Véran SSM, n=292 morning hours): SHF r=+0.667, PBL r=+0.604.
   LHF excluded — empirically dilutes combined SHF+PBL signal (r drops 0.686→0.636). */
function thermalPenalty(shf, pblHeight) {
  /* 1. Sensible heat flux — primary surface-layer Cn² driver (0-40 pts).
        Cn² ∝ H^(2/3); negative SHF = stable/night = no penalty. */
  var shfPen = 0;
  if (shf <= 0)        shfPen = 0;
  else if (shf < 50)   shfPen = 3;
  else if (shf < 150)  shfPen = 12;
  else if (shf < 300)  shfPen = 22;
  else if (shf < 500)  shfPen = 32;
  else                 shfPen = 40;

  /* 2. PBL height — deeper convective column = more integrated Cn² (0-28 pts).
        Quatresooz uses z^(-4/3) decay within PBL; deeper hBL = larger integrated turbulence.
        Big Bear Solar Observatory data: ground layer (<500m) holds 55-65% of turbulence. */
  var pblPen = 0;
  if (pblHeight < 500)       pblPen = 0;
  else if (pblHeight < 1000) pblPen = 3;
  else if (pblHeight < 1500) pblPen = 8;
  else if (pblHeight < 2500) pblPen = 15;
  else if (pblHeight < 3500) pblPen = 22;
  else                       pblPen = 28;

  return Math.min(shfPen + pblPen, 50);
}

function computeSeeingScore(layers) {
  var ws = 0;
  layers.forEach(function(l) { ws += windSpeedScore(l.speed, l.hpa) * l.weight; });
  return Math.max(0, Math.min(100, Math.round(ws - shearPenalty(layers))));
}

function scoreColor(s) { if (s>=80) return "#22c55e"; if (s>=65) return "#eab308"; if (s>=45) return "#f97316"; if (s>=25) return "#ef4444"; return "#991b1b"; }
function scoreText(s) { if (s>=80) return "Excellent"; if (s>=65) return "Good"; if (s>=45) return "Decent"; if (s>=25) return "Poor"; return "Bad"; }
function scoreHue(s) { return (s/100)*120; }
function dirLabel(d) { var a=["N","NNE","NE","ENE","E","ESE","SE","SSE","S","SSW","SW","WSW","W","WNW","NW","NNW"]; return a[Math.round(d/22.5)%16]; }
function fmtH(t) { var h=new Date(t).getHours(); return (h%12||12)+(h>=12?"p":"a"); }
function fmtDate(t) { return new Date(t).toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"}); }
function fmtWind(ms, mph) { return mph ? Math.round(ms*2.237) : ms.toFixed(1); }
function windUnit(mph) { return mph ? "mph" : "m/s"; }

/* Animates a number from its previous value to a new target on each change. */
function useAnimatedNumber(target, duration) {
  duration = duration || 350;
  var [display, setDisplay] = useState(target);
  var fromRef = React.useRef(target);
  useEffect(function() {
    var from = fromRef.current;
    if (from === target) { setDisplay(target); return; }
    var startTime = null;
    var rafId;
    function step(ts) {
      if (!startTime) startTime = ts;
      var p = Math.min((ts - startTime) / duration, 1);
      var ease = 1 - Math.pow(1 - p, 3);
      setDisplay(Math.round(from + (target - from) * ease));
      if (p < 1) rafId = requestAnimationFrame(step);
      else fromRef.current = target;
    }
    rafId = requestAnimationFrame(step);
    return function() { cancelAnimationFrame(rafId); };
  }, [target]);
  return display;
}

function thermalColor(pen) {
  if (pen < 5)  return "#22c55e";
  if (pen < 15) return "#eab308";
  if (pen < 30) return "#f97316";
  return "#ef4444";
}
function thermalBorder(pen) {
  if (pen < 5)  return "3px solid #22c55e";
  if (pen < 15) return "3px solid #eab308";
  if (pen < 30) return "3px solid #f97316";
  return "3px solid #ef4444";
}
function thermalLabel(pen) {
  if (pen < 5)  return "Stable";
  if (pen < 15) return "Moderate";
  if (pen < 30) return "Active";
  return "Severe";
}

function SeeingChart({ hours, date, selectedIdx, onSelect, currentIdx }) {
  var cH = 140;
  var barMaxW = hours.length <= 6 ? 50 : hours.length <= 10 ? 36 : hours.length <= 16 ? 30 : 26;
  var [animated,     setAnimated]     = useState(false);
  var [displayHours, setDisplayHours] = useState(hours);
  var [exitSet,      setExitSet]      = useState(new Set());
  var [enterSet,     setEnterSet]     = useState(new Set());
  var _transRef    = React.useRef(null);
  var _hoursKeyRef = React.useRef('');
  var _dateRef     = React.useRef(date);

  useEffect(function() {
    var t = setTimeout(function(){ setAnimated(true); }, 30);
    return function(){ clearTimeout(t); };
  }, []);

  useEffect(function() {
    var key = hours.length > 0
      ? hours[0].time + '_' + hours.length + '_' + hours[hours.length - 1].time : '';
    if (key === _hoursKeyRef.current) return;
    _hoursKeyRef.current = key;

    if (_transRef.current) {
      clearTimeout(_transRef.current);
      _transRef.current = null;
      setExitSet(new Set());
      setEnterSet(new Set());
      setDisplayHours(hours);
      setAnimated(false);
      setTimeout(function(){ setAnimated(true); }, 30);
      return;
    }

    if (date !== _dateRef.current) {
      _dateRef.current = date;
      setExitSet(new Set());
      setEnterSet(new Set());
      setDisplayHours(hours);
      setAnimated(false);
      setTimeout(function(){ setAnimated(true); }, 30);
      return;
    }

    var newSet   = new Set(hours.map(function(h){ return h.time; }));
    var curSet   = new Set(displayHours.filter(function(h){ return !exitSet.has(h.time); }).map(function(h){ return h.time; }));
    var removing = [...curSet].filter(function(t){ return !newSet.has(t); });
    var adding   = hours.filter(function(h){ return !curSet.has(h.time); }).map(function(h){ return h.time; });

    if (removing.length === 0 && adding.length === 0) { setDisplayHours(hours); return; }

    if (removing.length > 0) {
      setExitSet(new Set(removing));
      _transRef.current = setTimeout(function() {
        _transRef.current = null;
        setDisplayHours(hours);
        setExitSet(new Set());
        if (adding.length > 0) {
          setEnterSet(new Set(adding));
          requestAnimationFrame(function(){ requestAnimationFrame(function(){ setEnterSet(new Set()); }); });
        }
      }, 320);
    } else {
      setDisplayHours(hours);
      setEnterSet(new Set(adding));
      requestAnimationFrame(function(){ requestAnimationFrame(function(){ setEnterSet(new Set()); }); });
    }
  }, [hours]);

  return (
    <div style={{ width:"100%", overflowX:"auto", WebkitOverflowScrolling:"touch" }}>
      <div style={{ display:"flex", alignItems:"flex-end", height:cH+32,
                    minWidth: displayHours.filter(function(h){ return !exitSet.has(h.time); }).length * 34,
                    padding:"0 2px" }}>
        {displayHours.map(function(h) {
          var isExiting  = exitSet.has(h.time);
          var isEntering = enterSet.has(h.time);
          var collapsing = isExiting || isEntering;
          var actualIdx  = hours.findIndex(function(hr){ return hr.time === h.time; });
          var sel = actualIdx === selectedIdx;
          var cur = actualIdx === currentIdx;
          var bH  = Math.max(4, (h.score/100)*cH);
          var hue = scoreHue(h.score);
          return (
            <div key={h.time}
              onClick={function(){ if (!collapsing && actualIdx >= 0) onSelect(actualIdx); }}
              style={{
                flex: collapsing ? "0 0 0px" : 1,
                minWidth: collapsing ? 0 : 28,
                overflow: "hidden",
                display:"flex", flexDirection:"column", alignItems:"center",
                cursor: collapsing ? "default" : "pointer",
                padding: collapsing ? "0" : "2px 1px 0",
                opacity: isExiting ? 0 : 1,
                background: sel ? "rgba(255,255,255,0.06)" : "transparent",
                borderRadius: 6,
                transition: "flex 0.3s ease, min-width 0.3s ease, opacity 0.2s ease, padding 0.1s ease, background 0.15s",
              }}>
              <div style={{
                display:"flex", flexDirection:"column", alignItems:"center", width:"100%",
                transform: isEntering ? "translateX(40px)" : "translateX(0)",
                opacity: isEntering ? 0 : 1,
                transition: "transform 0.3s ease, opacity 0.25s ease",
              }}>
                <div style={{ display:"flex", alignItems:"center", gap:2, marginBottom:2, opacity: animated?1:0, transition:"opacity 0.35s ease" }}>
                  <span style={{ fontSize:9, fontWeight:700, color:"hsl("+hue+",60%,"+(sel?"60%":"45%")+")", fontFamily:"'JetBrains Mono',monospace", transition:"color 0.15s" }}>{h.score}</span>
                  {h.effCloud>=25 && <i className={h.effCloud>=75?"fa-solid fa-cloud":"fa-solid fa-cloud-sun"} style={{ fontSize:6, color:h.effCloud>=75?"#ef4444":h.effCloud>=50?"#f97316":"#eab308", opacity:0.7 }}></i>}
                </div>
                <div style={{
                  width:"100%", maxWidth:barMaxW, height: animated?bH:0, borderRadius:3,
                  background:"hsl("+hue+",55%,"+(sel?"42%":"32%")+")",
                  border: cur ? "2px solid rgba(239,239,239,0.7)" : "none",
                  transition:"height 0.5s cubic-bezier(0.34,1.56,0.64,1), background 0.15s, max-width 0.35s ease",
                }} />
                <span style={{ fontSize:8, marginTop:3, color:cur?"#efefef":sel?"#cbd5e1":"#64748b", fontFamily:"'JetBrains Mono',monospace", fontWeight:cur?700:400, opacity:animated?1:0, transition:"opacity 0.35s ease 0.1s" }}>{fmtH(h.time)}</span>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function WindLayerChart({ allHours: allHoursProp, selectedIdx, onSelect, useMph }) {
  var [displayHours, setDisplayHours] = useState(allHoursProp || []);
  var _windAnimRef = React.useRef(null);
  useEffect(function() {
    if (!allHoursProp || allHoursProp.length === 0) { setDisplayHours([]); return; }
    var from = displayHours;
    /* if length changed (different filter), snap immediately */
    if (!from || from.length !== allHoursProp.length) { setDisplayHours(allHoursProp); return; }
    var to = allHoursProp;
    var startTime = null;
    if (_windAnimRef.current) cancelAnimationFrame(_windAnimRef.current);
    function step(ts) {
      if (!startTime) startTime = ts;
      var p = Math.min((ts - startTime) / 450, 1);
      var ease = 1 - Math.pow(1 - p, 3);
      var interp = to.map(function(th, hi) {
        var sh = from[hi] || th;
        return Object.assign({}, th, {
          layers: th.layers.map(function(tl, li) {
            var sl = (sh.layers && sh.layers[li]) || tl;
            return Object.assign({}, tl, { speed: sl.speed + (tl.speed - sl.speed) * ease });
          })
        });
      });
      setDisplayHours(interp);
      if (p < 1) _windAnimRef.current = requestAnimationFrame(step);
      else { setDisplayHours(to); _windAnimRef.current = null; }
    }
    _windAnimRef.current = requestAnimationFrame(step);
    return function() { if (_windAnimRef.current) cancelAnimationFrame(_windAnimRef.current); };
  }, [allHoursProp]);
  /* Animate a fractional index so dots follow the line rather than cutting diagonally */
  var [displayedIdx, setDisplayedIdx] = useState(selectedIdx >= 0 ? selectedIdx : 0);
  var _idxAnimRef = React.useRef(null);
  var _idxFromRef = React.useRef(selectedIdx >= 0 ? selectedIdx : 0);
  /* On day change: snap immediately */
  useEffect(function() {
    if (_idxAnimRef.current) cancelAnimationFrame(_idxAnimRef.current);
    var snap = selectedIdx >= 0 ? selectedIdx : 0;
    setDisplayedIdx(snap);
    _idxFromRef.current = snap;
  }, [allHoursProp]);
  /* On hour change within same day: animate the float index */
  useEffect(function() {
    if (selectedIdx < 0) return;
    var from = _idxFromRef.current;
    var to   = selectedIdx;
    if (Math.abs(from - to) < 0.01) return;
    if (_idxAnimRef.current) cancelAnimationFrame(_idxAnimRef.current);
    var startTime = null;
    function step(ts) {
      if (!startTime) startTime = ts;
      var p    = Math.min((ts - startTime) / 350, 1);
      var ease = 1 - Math.pow(1 - p, 3);
      var cur  = from + (to - from) * ease;
      setDisplayedIdx(cur);
      if (p < 1) _idxAnimRef.current = requestAnimationFrame(step);
      else { _idxFromRef.current = to; _idxAnimRef.current = null; }
    }
    _idxAnimRef.current = requestAnimationFrame(step);
    return function() { if (_idxAnimRef.current) cancelAnimationFrame(_idxAnimRef.current); };
  }, [selectedIdx]);
  var allHours = displayHours; /* shadow: rest of component unchanged */
  if (!allHours || allHours.length === 0) return null;
  var padL = 35;
  var padR = 10;
  var padT = 8;
  var padB = 18;
  var cH = 100;
  var totalW = 600;
  var plotW = totalW - padL - padR;
  var maxWind = 0;
  allHours.forEach(function(h) { h.layers.forEach(function(l) { if (l.speed > maxWind) maxWind = l.speed; }); });
  maxWind = Math.max(maxWind, 10);
  var stepX = plotW / (allHours.length - 1 || 1);

  function hourX(i) { return padL + i * stepX; }
  function speedY(s) { return padT + cH - (s / maxWind) * cH; }

  function makePath(layerIdx) {
    var pts = allHours.map(function(h, i) {
      var x = hourX(i);
      var y = speedY(h.layers[layerIdx].speed);
      return (i === 0 ? "M" : "L") + x.toFixed(1) + "," + y.toFixed(1);
    });
    return pts.join(" ");
  }

  function handleClick(evt) {
    if (!onSelect) return;
    var svg = evt.currentTarget;
    var rect = svg.getBoundingClientRect();
    var svgX = (evt.clientX - rect.left) / rect.width * totalW;
    var plotX = svgX - padL;
    var idx = Math.round(plotX / stepX);
    idx = Math.max(0, Math.min(allHours.length - 1, idx));
    onSelect(idx);
  }

  var shearPairs = [[0,1],[1,2],[2,3]];
  var shearPerHour = allHours.map(function(h) {
    var total = 0;
    shearPairs.forEach(function(p) {
      var l1 = h.layers[p[0]], l2 = h.layers[p[1]];
      var r1 = l1.direction * Math.PI / 180, r2 = l2.direction * Math.PI / 180;
      var du = l2.speed * Math.sin(r2) - l1.speed * Math.sin(r1);
      var dv = l2.speed * Math.cos(r2) - l1.speed * Math.cos(r1);
      total += Math.sqrt(du * du + dv * dv);
    });
    return total;
  });
  var maxShear = Math.max.apply(null, shearPerHour);
  maxShear = Math.max(maxShear, 10);
  function shearY(s) { return padT + cH - (s / maxShear) * cH; }
  var shearPath = shearPerHour.map(function(s, i) {
    return (i === 0 ? "M" : "L") + hourX(i).toFixed(1) + "," + shearY(s).toFixed(1);
  }).join(" ");

  var yTicks = [0, Math.round(maxWind * 0.5), Math.round(maxWind)];
  var yTickLabels = yTicks.map(function(v) { return useMph ? Math.round(v * 2.237) : v.toFixed(0); });

  return (
    <div style={{ marginBottom: 10 }}>
      <div style={{ fontSize: 9, color: "#64748b", marginBottom: 6, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
        <span>Wind Speed by Layer</span>
        <div style={{ display: "flex", gap: 8 }}>
          {PRESSURE_LEVELS.map(function(pl) {
            return <span key={pl.hpa} style={{ display: "flex", alignItems: "center", gap: 3, fontSize: 8 }}>
              <span style={{ width: 8, height: 3, borderRadius: 1, background: pl.color, display: "inline-block" }}></span>
              <span style={{ color: "#94a3b8" }}>{pl.label}</span>
            </span>;
          })}
          <span style={{ display: "flex", alignItems: "center", gap: 3, fontSize: 8 }}>
            <span style={{ width: 8, height: 0, borderTop: "2px dashed #ef4444", display: "inline-block" }}></span>
            <span style={{ color: "#94a3b8" }}>Shear</span>
          </span>
        </div>
      </div>
      <div style={{ width: "100%" }}>
        <svg viewBox={"0 0 " + totalW + " " + (cH + padT + padB)} preserveAspectRatio="none" style={{ width: "100%", height: cH + padT + padB + 10, display: "block", cursor: "pointer" }} onClick={handleClick}>
          {yTicks.map(function(v, i) {
            var y = speedY(v);
            return <g key={i}>
              <line x1={padL} y1={y} x2={totalW - padR} y2={y} stroke="rgba(255,255,255,0.06)" strokeWidth="1" vectorEffect="non-scaling-stroke" />
              <text x={padL - 4} y={y + 3} textAnchor="end" fill="#475569" fontSize="8" fontFamily="'JetBrains Mono',monospace">{yTickLabels[i]}</text>
            </g>;
          })}
          <text x="6" y={padT + cH / 2} textAnchor="middle" fill="#334155" fontSize="7" fontFamily="'JetBrains Mono',monospace" transform={"rotate(-90,6," + (padT + cH / 2) + ")"}>{useMph?"mph":"m/s"}</text>
          <path d={shearPath + " L" + hourX(allHours.length - 1).toFixed(1) + "," + (padT + cH) + " L" + hourX(0).toFixed(1) + "," + (padT + cH) + " Z"} fill="rgba(239,68,68,0.06)" />
          {PRESSURE_LEVELS.map(function(pl, li) {
            return <path key={pl.hpa} d={makePath(li)} fill="none" stroke={pl.color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" opacity="0.8" vectorEffect="non-scaling-stroke" />;
          })}
          <path d={shearPath} fill="none" stroke="#ef4444" strokeWidth="1.5" strokeDasharray="4,3" strokeLinecap="round" strokeLinejoin="round" opacity="0.6" vectorEffect="non-scaling-stroke" />
          {selectedIdx >= 0 && selectedIdx < allHours.length && (function() {
            /* Interpolate position along line using float displayedIdx */
            var fi   = Math.max(0, Math.min(displayedIdx, allHours.length - 1));
            var lo   = Math.floor(fi);
            var hi   = Math.min(Math.ceil(fi), allHours.length - 1);
            var frac = fi - lo;
            var dispX = padL + fi * stepX;
            function interpSpeed(layerIdx) {
              var loS = allHours[lo] ? allHours[lo].layers[layerIdx].speed : 0;
              var hiS = allHours[hi] ? allHours[hi].layers[layerIdx].speed : loS;
              return loS + (hiS - loS) * frac;
            }
            var loShear = shearPerHour[lo] || 0;
            var hiShear = shearPerHour[hi] || 0;
            var dispShear = loShear + (hiShear - loShear) * frac;
            return [
              <line key="sel-line" x1={dispX} y1={padT} x2={dispX} y2={padT + cH}
                stroke="rgba(239,239,239,0.5)" strokeWidth="1" strokeDasharray="3,3"
                opacity="0.6" vectorEffect="non-scaling-stroke" />,
              PRESSURE_LEVELS.map(function(pl, li) {
                return <circle key={pl.hpa} cx={dispX} cy={speedY(interpSpeed(li))} r="4"
                  fill={pl.color} stroke="#0f172a" strokeWidth="1.5"
                  vectorEffect="non-scaling-stroke" />;
              }),
              <circle key="shear-dot" cx={dispX} cy={shearY(dispShear)} r="3"
                fill="#ef4444" stroke="#0f172a" strokeWidth="1"
                vectorEffect="non-scaling-stroke" opacity="0.7" />,
            ];
          })()}
          {allHours.map(function(h, i) {
            if (i % 2 !== 0 && allHours.length > 8) return null;
            var x = hourX(i);
            return <text key={i} x={x} y={padT + cH + 14} textAnchor="middle" fill={i===selectedIdx?"#efefef":"#475569"} fontSize="8" fontFamily="'JetBrains Mono',monospace" fontWeight={i===selectedIdx?700:400}>{fmtH(h.time)}</text>;
          })}
        </svg>
      </div>
    </div>
  );
}

function WindHeatMap({ allHours, selectedIdx, onSelect }) {
  if (!allHours || allHours.length === 0) return null;
  var rowH = 18;
  var shearH = 6;
  var layerOrder = [3, 2, 1, 0];
  var shearPairs = [[3, 2], [2, 1], [1, 0]];

  function speedToColor(speed_ms, hpa) {
    var score = windSpeedScore(speed_ms, hpa);
    var hue = scoreHue(score);
    var lightness = 18 + (score / 100) * 28;
    var sat = 55 + (100 - score) * 0.35;
    return "hsl(" + hue + "," + sat + "%," + lightness + "%)";
  }

  function layerShear(h, upperIdx, lowerIdx) {
    var u = h.layers[upperIdx], lo = h.layers[lowerIdx];
    var r1 = u.direction * Math.PI / 180, r2 = lo.direction * Math.PI / 180;
    var du = u.speed * Math.sin(r1) - lo.speed * Math.sin(r2);
    var dv = u.speed * Math.cos(r1) - lo.speed * Math.cos(r2);
    return Math.sqrt(du * du + dv * dv);
  }

  function shearToColor(shearVal) {
    var intensity = Math.min(1, shearVal / 30);
    if (intensity < 0.2) return "rgba(34,197,94,0.15)";
    if (intensity < 0.4) return "rgba(234,179,8,0.3)";
    if (intensity < 0.6) return "rgba(249,115,22,0.5)";
    if (intensity < 0.8) return "rgba(239,68,68,0.6)";
    return "rgba(239,68,68,0.85)";
  }

  return (
    <div style={{ marginBottom: 10 }}>
      <div style={{ fontSize: 9, color: "#64748b", marginBottom: 6, display: "flex", justifyContent: "space-between" }}>
        <span>Wind Quality by Altitude</span>
        <span style={{ fontSize: 7, color: "#475569" }}>bars = wind shear between layers</span>
      </div>
      <div style={{ display: "flex", width: "100%" }}>
        <div style={{ display: "flex", flexDirection: "column", marginRight: 4 }}>
          {layerOrder.map(function(li, rowIdx) {
            var pl = PRESSURE_LEVELS[li];
            var items = [];
            items.push(
              <div key={"layer-"+li} style={{ height: rowH, display: "flex", alignItems: "center", justifyContent: "flex-end" }}>
                <span style={{ fontSize: 7, color: "#64748b", fontFamily: "'JetBrains Mono',monospace", whiteSpace: "nowrap" }}>{pl.alt}</span>
              </div>
            );
            if (rowIdx < layerOrder.length - 1) {
              items.push(<div key={"shear-"+li} style={{ height: shearH }}></div>);
            }
            return items;
          })}
        </div>
        <div style={{ flex: 1 }}>
          {layerOrder.map(function(li, rowIdx) {
            var items = [];
            items.push(
              <div key={"row-"+li} style={{ display: "flex", height: rowH, gap: 1 }}>
                {allHours.map(function(h, hi) {
                  var l = h.layers[li];
                  var bg = speedToColor(l.speed, l.hpa);
                  var isSel = hi === selectedIdx;
                  return (
                    <div key={hi} onClick={function() { if (onSelect) onSelect(hi); }}
                      style={{
                        flex: 1, background: bg, cursor: "pointer",
                        borderRadius: 1,
                        border: isSel ? "1.5px solid rgba(239,239,239,0.6)" : "0.5px solid rgba(0,0,0,0.3)",
                        transition: "border 0.1s",
                      }}>
                    </div>
                  );
                })}
              </div>
            );
            if (rowIdx < layerOrder.length - 1) {
              var upperIdx = layerOrder[rowIdx];
              var lowerIdx = layerOrder[rowIdx + 1];
              items.push(
                <div key={"shear-"+li} style={{ display: "flex", height: shearH, gap: 1 }}>
                  {allHours.map(function(h, hi) {
                    var sv = layerShear(h, upperIdx, lowerIdx);
                    var bg = shearToColor(sv);
                    var isSel = hi === selectedIdx;
                    return (
                      <div key={hi} onClick={function() { if (onSelect) onSelect(hi); }}
                        style={{
                          flex: 1, background: bg, cursor: "pointer",
                          borderRadius: 0,
                          borderLeft: isSel ? "1.5px solid rgba(239,239,239,0.6)" : "none",
                          borderRight: isSel ? "1.5px solid rgba(239,239,239,0.6)" : "none",
                        }}>
                      </div>
                    );
                  })}
                </div>
              );
            }
            return items;
          })}
          <div style={{ display: "flex", height: 14, marginTop: 2 }}>
            {allHours.map(function(h, i) {
              if (i % 2 !== 0 && allHours.length > 8) return <div key={i} style={{ flex: 1 }}></div>;
              return <div key={i} style={{ flex: 1, textAlign: "center" }}>
                <span style={{ fontSize: 7, color: i === selectedIdx ? "#efefef" : "#475569", fontFamily: "'JetBrains Mono',monospace", fontWeight: i === selectedIdx ? 700 : 400 }}>{fmtH(h.time)}</span>
              </div>;
            })}
          </div>
        </div>
      </div>
    </div>
  );
}

function DetailPanel({ hour, allHours, selectedIdx, onSelect, useMph }) {
  if (!hour) return null;
  /* Single RAF loop — all values update in the same React render each frame */
  var _mkTarget = function(h) { return {
    score:    h.score,            windScore: h.windScore,
    tPen:     h.thermalPenalty||0, cloud:    Math.round(h.effCloud),
    shf:      Math.round(h.sensibleHeatFlux||0),
    pbl:      Math.round(h.pblHeight||0),
    cloudLo:  Math.round(h.cloudLow),
    cloudMid: Math.round(h.cloudMid),
    cloudHi:  Math.round(h.cloudHigh),
  }; };
  var [anim, setAnim] = useState(function(){ return _mkTarget(hour); });
  var _animRef = React.useRef(null);
  var _fromRef = React.useRef(anim);
  useEffect(function() {
    var from = _fromRef.current;
    var to   = _mkTarget(hour);
    if (_animRef.current) cancelAnimationFrame(_animRef.current);
    var startTime = null;
    function step(ts) {
      if (!startTime) startTime = ts;
      var p    = Math.min((ts - startTime) / 400, 1);
      var ease = 1 - Math.pow(1 - p, 3);
      var interp = {};
      Object.keys(to).forEach(function(k) {
        interp[k] = Math.round(from[k] + (to[k] - from[k]) * ease);
      });
      setAnim(interp);
      if (p < 1) _animRef.current = requestAnimationFrame(step);
      else { _fromRef.current = to; _animRef.current = null; }
    }
    _animRef.current = requestAnimationFrame(step);
    return function() { if (_animRef.current) cancelAnimationFrame(_animRef.current); };
  }, [hour]);
  var hue      = scoreHue(anim.score);
  var windHue  = scoreHue(anim.windScore);
  var tPen     = anim.tPen;
  var cloudPct = anim.cloud;
  var d = new Date(hour.time);
  var ts = d.toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit"});
  var cloudIcon = cloudPct<10?"fa-solid fa-sun":cloudPct<25?"fa-solid fa-sun":cloudPct<50?"fa-solid fa-cloud-sun":cloudPct<75?"fa-solid fa-cloud-sun":cloudPct<90?"fa-solid fa-cloud":"fa-solid fa-cloud-showers-heavy";
  var cloudIconColor = cloudPct<10?"#fbbf24":cloudPct<25?"#eab308":cloudPct<50?"#eab308":cloudPct<75?"#f97316":cloudPct<90?"#94a3b8":"#64748b";
  var cloudLabel = cloudPct<10?"Clear":cloudPct<25?"Mostly clear":cloudPct<50?"Partly cloudy":cloudPct<75?"Mostly cloudy":cloudPct<90?"Overcast":"Socked in";

  return (
    <div style={{ background:"rgba(255,255,255,0.025)", border:"1px solid rgba(255,255,255,0.07)", borderRadius:10, padding:14, marginTop:12 }}>
      {/* Top row: score, wind score, cloud */}
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:12 }}>
        <div style={{ display:"flex", alignItems:"center", gap:8 }}>
          <span style={{ fontSize:24, fontWeight:800, color:"hsl("+hue+",75%,55%)", fontFamily:"'JetBrains Mono',monospace" }}>{anim.score}</span>
          <div>
            <div style={{ fontSize:13, fontWeight:600, color:scoreColor(anim.score) }}>{scoreText(anim.score)}</div>
            <div style={{ fontSize:11, color:"#64748b" }}>{ts}</div>
          </div>
        </div>
        <div style={{ display:"flex", gap:10, alignItems:"center" }}>
          {(function(){
            var totalShear=0;
            for(var si=0;si<hour.layers.length-1;si++){
              var l1=hour.layers[si],l2=hour.layers[si+1];
              var r1=l1.direction*Math.PI/180,r2=l2.direction*Math.PI/180;
              var du=l2.speed*Math.sin(r2)-l1.speed*Math.sin(r1);
              var dv=l2.speed*Math.cos(r2)-l1.speed*Math.cos(r1);
              totalShear+=Math.sqrt(du*du+dv*dv);
            }
            return <span style={{ fontSize:10, color:"#f59e0b", fontFamily:"'JetBrains Mono',monospace", background:"rgba(245,158,11,0.1)", padding:"3px 7px", borderRadius:5 }}>Shear {fmtWind(totalShear/3,useMph)} {windUnit(useMph)}</span>;
          })()}
        </div>
      </div>

      {/* Three-column summary row: Wind Score | Thermals | Cloud Cover */}
      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:8, marginBottom:12 }}>

        {/* Wind Score card */}
        <div style={{ background:"rgba(255,255,255,0.03)", borderRadius:7, padding:"8px 10px", borderLeft:"3px solid hsl("+windHue+",70%,50%)" }}>
          <div style={{ fontSize:9, color:"#64748b", textTransform:"uppercase", letterSpacing:0.5, marginBottom:2 }}>Wind</div>
          <div style={{ display:"flex", alignItems:"baseline", gap:4 }}>
            <span style={{ fontSize:18, fontWeight:700, color:"hsl("+windHue+",75%,55%)", fontFamily:"'JetBrains Mono',monospace" }}>{anim.windScore}</span>
            <span style={{ fontSize:10, color:"#64748b" }}>/ 100</span>
          </div>
        </div>

        {/* Thermals card */}
        <div style={{ background:"rgba(255,255,255,0.03)", borderRadius:7, padding:"8px 10px", borderLeft:thermalBorder(tPen) }}>
          <div style={{ fontSize:9, color:"#64748b", textTransform:"uppercase", letterSpacing:0.5, marginBottom:2 }}>Thermals</div>
          <div style={{ display:"flex", alignItems:"baseline", gap:3, marginBottom:5 }}>
            <span style={{ fontSize:18, fontWeight:700, color:thermalColor(tPen), fontFamily:"'JetBrains Mono',monospace" }}>
              {tPen > 0 ? "-" : ""}{anim.tPen}
            </span>
            <span style={{ fontSize:9, color:"#64748b" }}>pts</span>
            <span style={{ fontSize:9, color:thermalColor(tPen), marginLeft:2, fontWeight:600 }}>{thermalLabel(tPen)}</span>
          </div>
          <div style={{ display:"flex", flexDirection:"column", gap:2, fontSize:9 }}>
            <div style={{ display:"flex", justifyContent:"space-between" }}>
              <span style={{ color:"#64748b" }}>SHF</span>
              <span style={{ color:"#94a3b8", fontFamily:"'JetBrains Mono',monospace" }}>{anim.shf}<span style={{ color:"#475569" }}> W/m²</span></span>
            </div>
            <div style={{ display:"flex", justifyContent:"space-between" }}>
              <span style={{ color:"#64748b" }}>PBL</span>
              <span style={{ color:"#94a3b8", fontFamily:"'JetBrains Mono',monospace" }}>{anim.pbl}<span style={{ color:"#475569" }}> m</span></span>
            </div>
          </div>
        </div>

        {/* Cloud Cover card */}
        <div style={{ background:"rgba(255,255,255,0.03)", borderRadius:7, padding:"8px 10px", borderLeft: cloudPct<25?"3px solid #22c55e":cloudPct<50?"3px solid #eab308":cloudPct<75?"3px solid #f97316":"3px solid #ef4444" }}>
          <div style={{ fontSize:9, color:"#64748b", textTransform:"uppercase", letterSpacing:0.5, marginBottom:4 }}>Cloud Cover</div>
          <div style={{ display:"flex", alignItems:"center", gap:6, marginBottom:6 }}>
            <i className={cloudIcon} style={{ fontSize:14, color:cloudIconColor }}></i>
            <span style={{ fontSize:15, fontWeight:700, color:"#e2e8f0", fontFamily:"'JetBrains Mono',monospace" }}>{anim.cloud}%</span>
          </div>
          <div style={{ fontSize:9, color:"#64748b", marginBottom:4 }}>{cloudLabel}</div>
          <div style={{ display:"flex", gap:6, fontSize:9 }}>
            <div style={{ display:"flex", alignItems:"center", gap:2 }}>
              <span style={{ color:"#64748b" }}>Lo</span>
              <span style={{ color: hour.cloudLow>50?"#ef4444":hour.cloudLow>25?"#f97316":"#94a3b8", fontFamily:"'JetBrains Mono',monospace", fontWeight:600 }}>{anim.cloudLo}%</span>
            </div>
            <div style={{ display:"flex", alignItems:"center", gap:2 }}>
              <span style={{ color:"#64748b" }}>Mi</span>
              <span style={{ color: hour.cloudMid>50?"#f97316":hour.cloudMid>25?"#eab308":"#94a3b8", fontFamily:"'JetBrains Mono',monospace", fontWeight:600 }}>{anim.cloudMid}%</span>
            </div>
            <div style={{ display:"flex", alignItems:"center", gap:2 }}>
              <span style={{ color:"#64748b" }}>Hi</span>
              <span style={{ color: hour.cloudHigh>50?"#eab308":"#94a3b8", fontFamily:"'JetBrains Mono',monospace", fontWeight:600 }}>{anim.cloudHi}%</span>
            </div>
          </div>
        </div>

      </div>

      {/* Multi-layer wind speed chart */}
      <WindLayerChart allHours={allHours} selectedIdx={selectedIdx} onSelect={onSelect} useMph={useMph} />

      {/* Layer detail grid */}
      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:6 }}>
        {hour.layers.map(function(l,i) {
          var windVal = fmtWind(l.speed, useMph);
          var ls = windSpeedScore(l.speed,l.hpa);
          var lh = scoreHue(ls);
          var pl = PRESSURE_LEVELS[i];
          return (
            <div key={i} style={{ background:"rgba(255,255,255,0.02)", borderRadius:7, padding:"8px 10px", borderLeft:"3px solid "+pl.color }}>
              <div style={{ display:"flex", justifyContent:"space-between", marginBottom:3 }}>
                <span style={{ fontSize:11, color:"#94a3b8", fontFamily:"'JetBrains Mono',monospace" }}>{pl.alt}</span>
                <span style={{ fontSize:9, color:"#475569" }}>{l.label}</span>
              </div>
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"baseline" }}>
                <span style={{ fontSize:15, fontWeight:700, color:"#e2e8f0", fontFamily:"'JetBrains Mono',monospace" }}>{windVal}<span style={{fontSize:10,color:"#64748b"}}> {windUnit(useMph)}</span></span>
                <span style={{ fontSize:11, color:"#94a3b8" }}>{dirLabel(l.direction)} {Math.round(l.direction)}&deg;</span>
              </div>
              <div style={{ marginTop:5, height:3, borderRadius:2, background:"rgba(255,255,255,0.06)" }}>
                <div style={{ width:ls+"%", height:"100%", borderRadius:2, background:"hsl("+lh+",70%,50%)", transition:"width 0.4s cubic-bezier(0.34,1.56,0.64,1), background 0.3s ease" }} />
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function DayCard({ date, hours, isToday, useMph }) {
  var nowH = new Date().getHours();
  var curIdx = isToday ? hours.findIndex(function(h){return new Date(h.time).getHours()===nowH;}) : -1;
  var best = hours.reduce(function(b,h){return h.score>b.score?h:b;},hours[0]);
  var defIdx = curIdx>=0 ? curIdx : hours.indexOf(best);
  var [sel, setSel] = useState(defIdx);
  var dayAvg = Math.round(hours.reduce(function(s,h){return s+h.score;},0)/hours.length);
  /* Reset selected hour when day changes OR when filter changes (hours.length changes) */
  useEffect(function() {
    var nh = new Date().getHours();
    var ci = isToday ? hours.findIndex(function(h){return new Date(h.time).getHours()===nh;}) : -1;
    var b  = hours.reduce(function(bx,h){return h.score>bx.score?h:bx;},hours[0]);
    setSel(ci>=0 ? ci : hours.indexOf(b));
  }, [date, hours.length]);
  /* Guard against stale sel being out-of-bounds during filter transitions */
  var safeSel = (sel >= 0 && sel < hours.length) ? sel : defIdx;

  return (
    <div style={{ background:"rgba(255,255,255,0.015)", border:"1px solid rgba(255,255,255,0.06)", borderRadius:14, padding:"16px 16px 14px", marginBottom:16 }}>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:12 }}>
        <div>
          <span style={{ fontSize:15, fontWeight:700, color:"#f1f5f9" }}>{date}</span>
          {isToday && <span style={{ fontSize:9, color:"#fbbf24", fontWeight:700, marginLeft:8, background:"rgba(251,191,36,0.15)", padding:"2px 6px", borderRadius:4 }}>TODAY</span>}
        </div>
        <div style={{ display:"flex", gap:14, alignItems:"center" }}>
          <div style={{textAlign:"right"}}>
            <div style={{fontSize:9,color:"#64748b",textTransform:"uppercase",letterSpacing:0.5}}>Best</div>
            <div style={{fontSize:13,fontWeight:700,color:"hsl("+scoreHue(best.score)+",75%,55%)",fontFamily:"'JetBrains Mono',monospace"}}>{best.score} <span style={{fontSize:9,fontWeight:400,color:"#64748b"}}>{fmtH(best.time)}</span></div>
          </div>
          <div style={{textAlign:"right"}}>
            <div style={{fontSize:9,color:"#64748b",textTransform:"uppercase",letterSpacing:0.5}}>Avg</div>
            <div style={{fontSize:13,fontWeight:700,color:scoreColor(dayAvg),fontFamily:"'JetBrains Mono',monospace"}}>{dayAvg}</div>
          </div>
        </div>
      </div>
      <SeeingChart hours={hours} date={date} selectedIdx={safeSel} onSelect={setSel} currentIdx={curIdx} />
      <DetailPanel hour={hours[safeSel]} allHours={hours} selectedIdx={safeSel} onSelect={setSel} useMph={useMph} />
    </div>
  );
}

function App() {
  var [data,setData]=useState(null), [loading,setLoading]=useState(true), [error,setError]=useState(null);
  var [lat,setLat]=useState(35.08), [lon,setLon]=useState(-85.29), [loc,setLoc]=useState("Chattanooga, TN");
  var [timeFilter,setTimeFilter]=useState("daylight");
  var [selectedDay,setSelectedDay]=useState(0);
  var [searchQuery,setSearchQuery]=useState("");
  var [searchResults,setSearchResults]=useState([]);
  var [showSearch,setShowSearch]=useState(false);
  var [geoLoading,setGeoLoading]=useState(false);
  var [useMph,setUseMph]=useState(true);
  var [showInfo,setShowInfo]=useState(false);
  var [showCoords,setShowCoords]=useState(false);
  var [latInput,setLatInput]=useState("");
  var [lonInput,setLonInput]=useState("");
  var [infoHtml,setInfoHtml]=useState("");
  var [weekAnim,setWeekAnim]=useState(false);

  function toggleInfo() { setShowInfo(!showInfo); }

  useEffect(function(){
    fetch("https://api.github.com/repos/uotw/solarseeing/readme",{headers:{Accept:"application/vnd.github.html+json"}})
    .then(function(r){return r.text();})
    .then(function(html){setInfoHtml(html);})
    .catch(function(){setInfoHtml("<p>Could not load README. Visit <a href='https://github.com/uotw/solarseeing' target='_blank'>github.com/uotw/solarseeing</a></p>");});
  },[]);

  function isUSCoords(la,lo) { return la>=24 && la<=50 && lo>=-125 && lo<=-66; }

  function doGeolocate() {
    if (!navigator.geolocation) return;
    setGeoLoading(true);
    navigator.geolocation.getCurrentPosition(function(pos) {
      var la=Math.round(pos.coords.latitude*100)/100;
      var lo=Math.round(pos.coords.longitude*100)/100;
      setLat(la); setLon(lo);
      setLoc("My Location");
      setUseMph(isUSCoords(la,lo));
      setGeoLoading(false);
      setSelectedDay(0);
    }, function() {
      setGeoLoading(false);
    }, {timeout:10000});
  }

  function doSearch(q) {
    if (!q || q.length < 2) { setSearchResults([]); return; }
    fetch("https://geocoding-api.open-meteo.com/v1/search?name="+encodeURIComponent(q)+"&count=10&language=en&format=json")
    .then(function(r){return r.json();})
    .then(function(j){
      if (j.results) setSearchResults(j.results);
      else setSearchResults([]);
    })
    .catch(function(){setSearchResults([]);});
  }

  function pickLocation(result) {
    setLat(Math.round(result.latitude*100)/100);
    setLon(Math.round(result.longitude*100)/100);
    var name = result.name;
    if (result.admin1) name += ", " + result.admin1;
    setLoc(name);
    setUseMph(result.country_code==="US" || result.country_code==="LR" || result.country_code==="MM");
    setSearchQuery("");
    setSearchResults([]);
    setShowSearch(false);

  function doManualCoords() {
    var la = parseFloat(latInput);
    var lo = parseFloat(lonInput);
    if (isNaN(la) || isNaN(lo) || la < -90 || la > 90 || lo < -180 || lo > 180) return;
    setLat(Math.round(la * 100) / 100);
    setLon(Math.round(lo * 100) / 100);
    setLoc("Custom location");
    setUseMph(isUSCoords(la, lo));
    setShowCoords(false);
    setLatInput("");
    setLonInput("");
    setSelectedDay(0);
  }

  var fetchData = useCallback(function() {
    setLoading(true); setError(null);
    var ps=[];
    [850,700,500,250].forEach(function(l){ps.push("wind_speed_"+l+"hPa","wind_direction_"+l+"hPa");});
    ps.push("is_day","cloud_cover","cloud_cover_low","cloud_cover_mid","cloud_cover_high");
    ps.push("sensible_heat_flux","boundary_layer_height");
    var url = "https://api.open-meteo.com/v1/forecast?latitude="+lat+"&longitude="+lon
      +"&hourly="+ps.join(",")
      +"&daily=sunrise,sunset"
      +"&wind_speed_unit=ms&timezone=auto&forecast_days=7&models=gfs_seamless";
    fetch(url)
    .then(function(r){if(!r.ok)throw new Error("API "+r.status);return r.json();})
    .then(function(j){
      if(j.error) throw new Error(j.reason||"API error");
      var sunriseMap = {};
      if (j.daily && j.daily.time && j.daily.sunrise) {
        j.daily.time.forEach(function(dt, idx) {
          var srTime = new Date(j.daily.sunrise[idx]);
          sunriseMap[dt] = srTime.getHours();
        });
      }
      var hrs=j.hourly.time.map(function(t,i){
        var layers=PRESSURE_LEVELS.map(function(pl){return{hpa:pl.hpa,label:pl.label,alt:pl.alt,weight:pl.weight,speed:(j.hourly["wind_speed_"+pl.hpa+"hPa"]||[])[i]||0,direction:(j.hourly["wind_direction_"+pl.hpa+"hPa"]||[])[i]||0};});
        var windScore=computeSeeingScore(layers);
        var cloudTotal=(j.hourly.cloud_cover||[])[i]||0;
        var cloudLow=(j.hourly.cloud_cover_low||[])[i]||0;
        var cloudMid=(j.hourly.cloud_cover_mid||[])[i]||0;
        var cloudHigh=(j.hourly.cloud_cover_high||[])[i]||0;
        var effCloud = Math.min(100, cloudLow + cloudMid*0.8 + cloudHigh*0.3);
        effCloud = Math.max(effCloud, cloudTotal);
        var cloudMult = effCloud<10?1.0 : effCloud<30?0.95 : effCloud<50?0.9 : effCloud<70?0.8 : effCloud<85?0.5 : effCloud<95?0.2 : 0.05;
        /* Boundary layer thermal scoring (Andreas 1988, Quatresooz 2023, Beason 2024) */
        var shf=(j.hourly.sensible_heat_flux||[])[i]||0;
        var pblH=(j.hourly.boundary_layer_height||[])[i]||0;
        var tPen=thermalPenalty(shf,pblH);
        var thermalAdjScore=Math.max(0,windScore-tPen);
        var finalScore = Math.round(thermalAdjScore * cloudMult);
        var dateStr = t.substring(0,10);
        var sunriseHour = sunriseMap[dateStr] || 6;
        return{time:t,isDay:j.hourly.is_day[i],layers:layers,windScore:windScore,
          cloud:cloudTotal,cloudLow:cloudLow,cloudMid:cloudMid,cloudHigh:cloudHigh,effCloud:effCloud,
          cloudMult:cloudMult,score:finalScore,shearPenalty:shearPenalty(layers),sunriseHour:sunriseHour,
          sensibleHeatFlux:shf,pblHeight:pblH,thermalPenalty:tPen};
      });
      setData(hrs); setLoading(false); setWeekAnim(false); setTimeout(function(){setWeekAnim(true);},50);
    }).catch(function(e){setError(e.message);setLoading(false);});
  },[lat,lon]);

  useEffect(function(){fetchData();},[fetchData]);

        {showInfo && (

          return (
            <div>
              <div style={{background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.06)",borderRadius:14,padding:"16px 16px 14px",marginBottom:20}}>
                <div style={{fontSize:13,fontWeight:700,color:"#94a3b8",marginBottom:14,textAlign:"center"}}>7-Day Forecast &mdash; Best {timeFilter==="morning"?"Morning":timeFilter==="daylight"?"Daytime":""} Seeing</div>
                <div style={{display:"flex",gap:4,alignItems:"flex-end",justifyContent:"center"}}>
                  {weekData.map(function(d,i){
                    var score = d.bestScore;
                    var hue = scoreHue(score);
                    var barH = Math.max(8, (score/100)*100);
                    var dayName = d.date.split(",")[0];
                    var isSel = i === selectedDay;
                    return (
                      <div key={i} onClick={function(){setSelectedDay(i)}} style={{
                        display:"flex",flexDirection:"column",alignItems:"center",flex:1,maxWidth:90,cursor:"pointer",
                        background: isSel ? "rgba(255,255,255,0.06)" : "transparent",
                        borderRadius: 10, padding: "8px 4px 6px",
                        transition:"background 0.2s",
                      }}>
                        <span style={{fontSize:16,fontWeight:800,color:"hsl("+hue+",75%,55%)",fontFamily:"'JetBrains Mono',monospace",marginBottom:2,opacity:weekAnim?1:0,transition:"opacity 0.4s ease"}}>{score}</span>
                        <span style={{fontSize:8,fontWeight:600,color:"hsl("+hue+",60%,45%)",marginBottom:4,textTransform:"uppercase",letterSpacing:0.5,opacity:weekAnim?1:0,transition:"opacity 0.4s ease"}}>{scoreText(score)}</span>
                        <div style={{width:"100%",maxWidth:50,height:weekAnim?barH:0,borderRadius:5,background:"hsl("+hue+",65%,"+(isSel?"42%":"32%")+")",transition:"height 0.6s cubic-bezier(0.34,1.56,0.64,1), background 0.3s"}} />
                        <span style={{fontSize:9,color:"#64748b",marginTop:4,fontFamily:"'JetBrains Mono',monospace",opacity:weekAnim?1:0,transition:"opacity 0.35s ease 0.1s"}}>{d.bestTime}</span>
                        <span style={{fontSize:10,fontWeight:isSel||d.isToday?700:500,color:isSel?"#efefef":d.isToday?"rgba(239,239,239,0.7)":"#94a3b8",marginTop:2,opacity:weekAnim?1:0,transition:"opacity 0.35s ease 0.1s"}}>{dayName}</span>
                      </div>
                    );
                  })}
                </div>
              </div>
              {entries[selectedDay] && (
                <DayCard key="daycard" date={entries[selectedDay][0]} hours={entries[selectedDay][1]} isToday={entries[selectedDay][0]===todayStr} useMph={useMph}/>
              )}
            </div>
          );
        })()}

        <div style={{textAlign:"center",marginTop:28,padding:14,fontSize:9,color:"#334155",borderTop:"1px solid rgba(255,255,255,0.04)"}}>
          Data: NOAA GFS via Open-Meteo &middot; Tuned for solar imaging &middot; Image before 9 AM on 65+ days
          <div style={{marginTop:8,fontSize:10,color:"#475569"}}>Built by Ben C. Smith, MD</div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.render(<App/>, document.getElementById("root"));
</script>
